services:
  opensearch:
    build:
      context: .
      args:
        OPENSEARCH_VERSION: ${OPENSEARCH_VERSION}
    image: attackframework-opensearch:${OPENSEARCH_VERSION}
    container_name: opensearch
    environment:
      - cluster.name=${CLUSTER_NAME}
      - node.name=opensearch
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS}
      - DISABLE_INSTALL_DEMO_CONFIG=false
      - DISABLE_SECURITY_PLUGIN=false
      - OPENSEARCH_PUBLISH_HOST=${OPENSEARCH_PUBLISH_HOST}
      - OPENSEARCH_BIND_ADDRESS=${OPENSEARCH_BIND_ADDRESS}
      - OPENSEARCH_PORT=${OPENSEARCH_PORT}
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-}
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - ${DATA_VOLUME_ROOT}/opensearch/data:/usr/share/opensearch/data
      - ${DATA_VOLUME_ROOT}/opensearch/logs:/usr/share/opensearch/logs
      - ${DATA_VOLUME_ROOT}/certs:/usr/share/opensearch/config/certs
      - ./config/opensearch.yml:/usr/share/opensearch/config/opensearch.yml
      - ./config/opensearch-performance-analyzer:/usr/share/opensearch/config/opensearch-performance-analyzer
    ports:
      - "${OPENSEARCH_BIND_ADDRESS}:${OPENSEARCH_PORT}:${OPENSEARCH_PORT}"
      - "${OPENSEARCH_BIND_ADDRESS}:${OPENSEARCH_DIAGNOSTICS_PORT}:9600"
    networks:
      opensearch-net:
        aliases:
          - opensearch.url
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -sk -o /dev/null -w '%{http_code}' https://opensearch.url:${OPENSEARCH_PORT}/_cluster/health); test \"$$code\" = '200' || test \"$$code\" = '401' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  opensearch-net:
    driver: bridge
