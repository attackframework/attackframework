services:
  opensearch-dashboards:
    build:
      context: ../opensearch-dashboards
      dockerfile: Dockerfile
      args:
        OPENSEARCH_VERSION: ${OPENSEARCH_VERSION}
    image: attackframework-opensearch-dashboards:${OPENSEARCH_VERSION}
    container_name: opensearch-dashboards
    ports:
      - "${OPENSEARCH_DASHBOARDS_BIND_ADDRESS}:${OPENSEARCH_DASHBOARDS_PORT}:${OPENSEARCH_DASHBOARDS_PORT}"
    environment:
      - OPENSEARCH_DASHBOARDS_BIND_ADDRESS=${OPENSEARCH_DASHBOARDS_BIND_ADDRESS}
      - OPENSEARCH_DASHBOARDS_PORT=${OPENSEARCH_DASHBOARDS_PORT}
      - OPENSEARCH_PORT=${OPENSEARCH_PORT}
      - OPENSEARCH_HOSTS=["https://${OPENSEARCH_PUBLISH_HOST}:${OPENSEARCH_PORT}"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=false
      - OPENSEARCH_DEFAULT_DATASOURCE=true
      - OPENSEARCH_DATASOURCES=[{"id":"default","name":"Default","type":"opensearch","endpoint":"https://${OPENSEARCH_PUBLISH_HOST}:${OPENSEARCH_PORT}"}]
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_DASHBOARDS_PASSWORD:-}
    volumes:
      - ${DATA_VOLUME_ROOT}/opensearch-dashboards/data:/usr/share/opensearch-dashboards/data
      - ${DATA_VOLUME_ROOT}/opensearch-dashboards/logs:/usr/share/opensearch-dashboards/logs
      - ${DATA_VOLUME_ROOT}/certs:/usr/share/opensearch-dashboards/config/certs:ro
      - ../opensearch-dashboards/config/opensearch_dashboards.yml:/templates/opensearch_dashboards.yml:ro
    networks:
      - opensearch-net
    # OPENSEARCH_HOSTS uses OPENSEARCH_PUBLISH_HOST (set opensearch.url in .env)
    depends_on:
      opensearch:
        condition: service_healthy

networks:
  opensearch-net:
    driver: bridge
