# Substituted at container start from .env (envsubst). No hardcoded bind or ports.
server.host: "${OPENSEARCH_DASHBOARDS_BIND_ADDRESS}"
server.port: ${OPENSEARCH_DASHBOARDS_PORT}
server.ssl.enabled: true
server.ssl.certificate: "/usr/share/opensearch-dashboards/config/certs/node.pem"
server.ssl.key: "/usr/share/opensearch-dashboards/config/certs/node-key.pem"
opensearch.hosts: ["https://opensearch.url:${OPENSEARCH_PORT}"]
opensearch.ssl.verificationMode: certificate
opensearch.ssl.certificateAuthorities: ["/usr/share/opensearch-dashboards/config/certs/root-ca.pem"]
logging.dest: stdout

# The new OpenSearch Dashboards Experience
data_source.enabled: true
workspace.enabled: true
explore.enabled: true
