# Substituted at container start from .env (envsubst). No hardcoded bind or ports.
server.host: "${OPENSEARCH_DASHBOARDS_BIND_ADDRESS}"
server.port: ${OPENSEARCH_DASHBOARDS_PORT}
server.ssl.enabled: true
server.ssl.certificate: "/usr/share/opensearch-dashboards/config/certs/dashboards.pem"
server.ssl.key: "/usr/share/opensearch-dashboards/config/certs/dashboards-key.pem"
opensearch.hosts: ["https://opensearch.url:${OPENSEARCH_PORT}"]
opensearch.ssl.verificationMode: certificate
opensearch.ssl.certificateAuthorities: ["/usr/share/opensearch-dashboards/config/certs/root-ca.pem"]
logging.dest: stdout

# Workspaces/data-source UI are intentionally disabled in this repo.
# Isolation is handled by running separate clusters.
data_source.enabled: false
workspace.enabled: false
explore.enabled: false

# Discover's default wildcard highlight can build huge response strings for
# indices with multi-MB nested body fields (e.g. Burp findings). Disable it
# to avoid hitting OpenSearch's per-string JSON parse ceiling in Discover.
uiSettings.overrides:
  "doc_table:highlight": false
