# Minimal config so a mounted file does not replace image defaults with an empty set.
# OpenSearch URL is overridden at runtime by env OPENSEARCH_HOSTS from docker-compose.

server.host: "0.0.0.0"
server.port: 5601
opensearch.hosts: ["http://opensearch:9200"]
logging.dest: stdout

# The new OpenSearch Dashboards Experience
data_source.enabled: true
workspace.enabled: true
explore.enabled: true
